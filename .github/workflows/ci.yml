name: CI

# Runs the offline test suite (no network, no GPU) on every push/PR.
# Heavy extras (backend, db, eval, robotics) are not installed here - those are
# exercised in notebooks / integration environments, not unit CI.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check drona tests

      - name: Type-check (mypy, non-blocking)
        run: mypy drona || true

      - name: Test (pytest, offline)
        run: pytest -q
