# D.R.O.N.A. ROS2 node parameters (simulation / development defaults)
# Loaded by all launch files. Override per-deployment in hardware.yaml.

drona_perception_node:
  ros__parameters:
    use_camera: false          # true = real camera + MediaPipe
    camera_index: 0
    detection_hz: 10.0
    image_topic: ""            # e.g. /drona/camera/image_raw (set by the Gazebo launch)

drona_gesture_node:
  ros__parameters:
    use_hardware: false        # true = SO-100 arm via Dynamixel SDK
    checkpoint_dir: ""         # "" = auto-detect data/checkpoints/
    joint_pub_hz: 20.0

drona_policy_node:
  ros__parameters:
    checkpoint_dir: ""         # "" = auto-detect data/checkpoints/ (ACT -> ONNX -> BC -> keyframe)
    device: cpu
    control_hz: 20.0
    use_hardware: false        # true = also command the physical arm

drona_advising_node:
  ros__parameters:
    log_level: INFO
    max_pathways: 3

drona_orchestrator_node:
  ros__parameters:
    session_timeout_s: 8.0
    tick_hz: 10.0
    max_pathways: 3

drona_diagnostics_node:
  ros__parameters:
    publish_hz: 1.0
    stale_after_s: 5.0
